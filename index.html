<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kirjanpito — Yrittäjän taloustyökalu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>

  <!-- ─── Kirjautuminen ──────────────────────────────────────────────── -->
  <div id="login-view" class="login-view">
    <div class="login-card">
      <div class="login-logo">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <rect width="36" height="36" rx="10" fill="rgba(163,230,53,0.12)"/>
          <path d="M10 26L18 10L26 26" stroke="#a3e635" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M13 21h10" stroke="#a3e635" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <span class="logo-text">Kirjanpito</span>
      </div>
      <h1>Kirjaudu sisään</h1>
      <p class="login-sub">Yrittäjän taloustyökalu</p>
      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="login-email">Sähköposti</label>
          <input class="form-input" type="email" id="login-email" placeholder="sinä@yritys.fi" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Salasana</label>
          <input class="form-input" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <div id="login-error" class="alert alert-error hidden"></div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn">
          <span class="btn-text">Kirjaudu sisään</span>
          <span class="btn-loading hidden">Kirjaudutaan...</span>
        </button>
      </form>
      <p class="login-footer">
        Ei tiliä vielä?
        <a href="#" id="show-register">Luo tunnus</a>
      </p>
    </div>
    <!-- Rekisteröinti-popup -->
    <div id="register-card" class="login-card hidden">
      <div class="login-logo">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <rect width="36" height="36" rx="10" fill="rgba(163,230,53,0.12)"/>
          <path d="M10 26L18 10L26 26" stroke="#a3e635" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M13 21h10" stroke="#a3e635" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <span class="logo-text">Kirjanpito</span>
      </div>
      <h1>Luo tunnus</h1>
      <form id="register-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="reg-email">Sähköposti</label>
          <input class="form-input" type="email" id="reg-email" placeholder="sinä@yritys.fi" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-password">Salasana</label>
          <input class="form-input" type="password" id="reg-password" placeholder="Vähintään 8 merkkiä" required />
        </div>
        <div id="register-error" class="alert alert-error hidden"></div>
        <div id="register-success" class="alert alert-success hidden"></div>
        <button type="submit" class="btn btn-primary btn-full" id="register-btn">Luo tunnus</button>
      </form>
      <p class="login-footer"><a href="#" id="show-login">← Takaisin kirjautumiseen</a></p>
    </div>
  </div>

  <!-- ─── Sovelluskuori (näytetään kirjautumisen jälkeen) ─────────────── -->
  <div id="app-shell" class="app-shell hidden">

    <!-- Sivupalkki -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <svg width="28" height="28" viewBox="0 0 36 36" fill="none">
            <rect width="36" height="36" rx="10" fill="rgba(163,230,53,0.12)"/>
            <path d="M10 26L18 10L26 26" stroke="#a3e635" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M13 21h10" stroke="#a3e635" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
          <span>Kirjanpito</span>
        </div>
        <button class="sidebar-close" id="sidebar-close" aria-label="Sulje valikko">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <nav class="sidebar-nav" role="navigation" aria-label="Päävalikko">
        <a href="#kojelauta" class="nav-item" data-route="kojelauta">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
          <span>Kojelauta</span>
        </a>
        <a href="#laskut" class="nav-item" data-route="laskut">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/>
          </svg>
          <span>Laskut</span>
        </a>
        <a href="#asiakkaat" class="nav-item" data-route="asiakkaat">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/>
          </svg>
          <span>Asiakkaat</span>
        </a>
        <a href="#kulut" class="nav-item" data-route="kulut">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>
          </svg>
          <span>Kulut</span>
        </a>

        <div class="nav-divider"></div>

        <a href="#verolaskelma" class="nav-item" data-route="verolaskelma">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
          <span>Verolaskelma</span>
        </a>
        <a href="#raportit" class="nav-item" data-route="raportit">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
          <span>Raportit</span>
        </a>
        <a href="#asetukset" class="nav-item" data-route="asetukset">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
          <span>Asetukset</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="user-info" id="sidebar-user">
          <div class="user-avatar" id="user-avatar-initials">?</div>
          <div class="user-details">
            <span class="user-name" id="sidebar-user-name">Käyttäjä</span>
            <span class="user-email" id="sidebar-user-email"></span>
          </div>
        </div>
        <button class="btn-logout" id="logout-btn" title="Kirjaudu ulos">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </aside>

    <!-- Pääsisältö -->
    <div class="main-wrapper">
      <header class="topbar">
        <button class="menu-toggle" id="menu-toggle" aria-label="Avaa valikko">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <h2 class="page-title" id="page-title">Kojelauta</h2>
        <div class="topbar-right" id="topbar-actions"></div>
      </header>

      <main class="content-area" id="content-area" role="main">
        <!-- Dynaaminen sisältö renderöidään tähän -->
        <div class="loading-screen">
          <div class="spinner"></div>
        </div>
      </main>
    </div>
  </div>

  <!-- ─── Modaali (yleinen) ────────────────────────────────────────── -->
  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true"></div>
  <div id="modal-container" class="modal-container hidden">
    <div class="modal-box" id="modal-box">
      <button class="modal-close" id="modal-close" aria-label="Sulje">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- ─── Vahvistusmodaali ─────────────────────────────────────────── -->
  <div id="confirm-overlay" class="modal-overlay hidden"></div>
  <div id="confirm-container" class="modal-container hidden">
    <div class="modal-box modal-sm">
      <h3 id="confirm-title">Vahvista toiminto</h3>
      <p id="confirm-message"></p>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="confirm-cancel">Peruuta</button>
        <button class="btn btn-danger" id="confirm-ok">Vahvista</button>
      </div>
    </div>
  </div>

  <!-- ─── Toast-ilmoitukset ─────────────────────────────────────────── -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
